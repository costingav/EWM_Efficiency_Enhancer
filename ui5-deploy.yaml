specVersion: "3.1"
metadata:
  name: bearingpoint.ewm.materialmaintenance

type: application

builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
      - /.DS_Store
      - /**/.DS_Store

  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        verbose: true
        target:
          destination: S06_P
          client: "115"
          url: http://bedusapp06.dev.bearingpoint.com:50000/
        app:
          name: ZEWM_M_MATERIAL
          description: EWM Efficiency Enhancer
          package: ZEWM_MAINT_MATERIALS
          transport: S06K906433 
          overwrite: true